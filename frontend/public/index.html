<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario · Componentes electrónicos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-overlay" class="login-overlay">
    <form id="login-form" class="login-box">
      <span class="brand__mark" aria-hidden="true"></span>
      <h1>Inventario</h1>
      <p class="brand__sub">Ingresá la contraseña para continuar</p>
      <input type="password" id="login-password" placeholder="Contraseña" required autofocus>
      <div id="login-error" class="login-error hidden"></div>
      <button type="submit" class="btn btn--primary">Entrar</button>
    </form>
  </div>

  <div class="board hidden" id="board">
    <header class="board__header">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true"></span>
        <div>
          <h1>Inventario</h1>
          <p class="brand__sub">componentes &amp; materiales electrónicos</p>
        </div>
      </div>
      <div class="header-right">
        <div class="header-stats" id="header-stats"></div>
        <button id="btn-new" class="btn btn--primary">+ Componente</button>
        <button id="btn-logout" class="btn" title="Cerrar sesión">Salir</button>
      </div>
    </header>

    <div class="layout">
      <nav class="sidebar" id="sidebar">
        <button type="button" class="sidebar__item" data-view="grid">📦 <span>Inventario</span></button>
        <div class="sidebar__section">Categorías</div>
        <div id="sidebar-categories"></div>
        <div class="sidebar__section">&nbsp;</div>
        <button type="button" class="sidebar__item" data-view="shopping">🛒 <span>Lista de compras</span></button>
      </nav>

      <main class="content">
        <!-- Vista: inventario completo (tarjetas) -->
        <div id="view-grid">
          <section class="controls">
            <input id="search" type="text" placeholder="Buscar por nombre, valor o número de parte…" autocomplete="off">
            <select id="category-filter">
              <option value="">Todas las categorías</option>
            </select>
            <label class="toggle">
              <input type="checkbox" id="low-stock-toggle">
              <span>Solo stock bajo</span>
            </label>
          </section>
          <div id="empty-state" class="empty-state hidden">
            <p>No hay componentes que coincidan.</p>
          </div>
          <div id="grid" class="grid"></div>
        </div>

        <!-- Vista: tabla de una categoría -->
        <div id="view-table" class="hidden">
          <h2 id="table-title"></h2>
          <table class="table">
            <thead>
              <tr><th>Nombre</th><th>Valor</th><th>Cantidad</th><th>Ubicación</th></tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>

        <!-- Vista: lista de compras (stock bajo) -->
        <div id="view-shopping" class="hidden">
          <h2>Lista de compras</h2>
          <p class="muted">Componentes con cantidad igual o menor al mínimo configurado.</p>
          <ul class="shopping-list" id="shopping-list"></ul>
        </div>
      </main>
    </div>
  </div>

  <!-- Panel lateral: crear/editar -->
  <div id="overlay" class="overlay hidden"></div>
  <aside id="drawer" class="drawer hidden">
    <div class="drawer__head">
      <h2 id="drawer-title">Nuevo componente</h2>
      <button id="drawer-close" class="btn-icon" aria-label="Cerrar">✕</button>
    </div>
    <form id="component-form">
      <input type="hidden" id="f-id">

      <label>Nombre *
        <input id="f-name" required placeholder="ej: Resistencia 10kΩ 1/4W">
      </label>

      <div class="grid-2">
        <label>Categoría *
          <input id="f-category" required list="category-list" placeholder="ej: resistencia">
          <datalist id="category-list"></datalist>
        </label>
        <label>Subcategoría
          <input id="f-subcategory" placeholder="ej: película metálica">
        </label>
      </div>

      <div class="grid-3">
        <label>Valor / spec
          <input id="f-value" placeholder="10kΩ, 100µF...">
        </label>
        <label>Voltaje
          <input id="f-voltage" placeholder="16V">
        </label>
        <label>Tolerancia
          <input id="f-tolerance" placeholder="±5%">
        </label>
      </div>

      <div class="grid-2">
        <label>Encapsulado
          <input id="f-package" placeholder="THT, SMD 0805, DIP-8...">
        </label>
        <label>Ubicación
          <input id="f-location" placeholder="Gaveta 3B">
        </label>
      </div>

      <div class="grid-2">
        <label>Cantidad *
          <input id="f-quantity" type="number" min="0" required value="0">
        </label>
        <label>Mínimo (alerta)
          <input id="f-min-quantity" type="number" min="0" value="0">
        </label>
      </div>

      <div class="grid-2">
        <label>Fabricante
          <input id="f-manufacturer">
        </label>
        <label>Número de parte
          <input id="f-part-number">
        </label>
      </div>

      <label>Enlace a datasheet
        <input id="f-datasheet" type="url" placeholder="https://...">
      </label>

      <label>Notas
        <textarea id="f-notes" rows="3"></textarea>
      </label>

      <div class="drawer__actions">
        <button type="button" id="btn-delete" class="btn btn--danger hidden">Eliminar</button>
        <div class="spacer"></div>
        <button type="button" id="btn-cancel" class="btn">Cancelar</button>
        <button type="submit" class="btn btn--primary">Guardar</button>
      </div>
    </form>
  </aside>

  <script src="icons.js"></script>
  <script src="app.js"></script>
</body>
</html>
